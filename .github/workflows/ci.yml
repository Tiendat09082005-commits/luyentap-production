name: CI

on:
  push:
    branches:
      - main 

  pull_request: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install

      - run: docker build -t tida-technology . 