services:
  app:
    build: .
    container_name: tida-app
    ports:
      - "2701:2701"
    env_file:
      - .env
    depends_on:
      redis: 
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

  redis:
    image: redis:7-alpine
    container_name: tida-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"
